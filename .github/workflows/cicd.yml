# This is name of workflow that will be displayes in the Action tab 

name: CICD

# manual click (delivery) workflow whenever user needs

on:
  workflow_dispatch:
    inputs:
      environment: 
        default: 'dev' 
        description: This is the environment value where this workflow runs options
        required: true 
        type: choice 
        options:
          - dev
          - prod
          - staging 
        

jobs:
# every job needs seprate runner , its called parallelism
  code:
    runs-on: ubuntu-latest 
    steps:
      - name: checkout code
        run: echo "code clone from Github"

  build:
    needs: [code]
    runs-on: ubuntu-latest 
    steps:
        - name: build docker container 
          run: echo "Docker Container build"

  tests:
    needs: [build]
    runs-on: ubuntu-latest 
    steps: 
      - name: Test the container
        run: echo "Testing the container"
  deploy:
    needs: [build,tests]
    runs-on: ubuntu-latest 
    steps:
      - name: Deploy the app 
        run: echo "Docker compose deploy the app"  
